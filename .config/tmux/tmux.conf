set -g prefix C-Space
unbind C-b
bind C-Space send-prefix

set -g default-terminal 'tmux-256color'
set -as terminal-features ',xterm-ghostty:RGB'
set -g default-shell '/opt/homebrew/bin/fish'
set -g base-index 1
setw -g pane-base-index 1
set -g renumber-windows on
set -g escape-time 0
set -g focus-events on
set -g history-limit 100000
set -g mouse on
set -g set-clipboard on
setw -g mode-keys vi
setw -g cursor-style bar
setw -g automatic-rename on
setw -g automatic-rename-format '#{b:pane_current_path}'

set -g status-position top
set -g status-justify centre
set -g status-left-length 80
set -g status-left '#($HOME/.config/tmux/session-strip "#S")'
set -g status-right '#{?client_prefix,#[reverse,bold] PREFIX #[default],} #[fg=colour245]%H:%M '
set -g status-style 'bg=default,fg=colour245'
set -g window-status-separator ''
set -g window-status-current-format '#[fg=#6d28d9,bold] ● #I:#W#{?window_zoomed_flag, Z,} '
set -g window-status-format '#[fg=colour242] · #I:#W '
set -g pane-border-style 'fg=colour238'
set -g pane-active-border-style 'fg=#6d28d9,bold'
set -g pane-border-status top
set -g pane-border-format ''

# Ghostty private sequences for Command shortcuts.
set -s user-keys[0] "\e[5;30010~"
set -s user-keys[1] "\e[5;30011~"
set -s user-keys[2] "\e[5;30012~"
set -s user-keys[3] "\e[5;30013~"
set -s user-keys[4] "\e[5;30014~"
set -s user-keys[5] "\e[5;30015~"
set -s user-keys[6] "\e[5;30016~"
set -s user-keys[7] "\e[5;30017~"
set -s user-keys[8] "\e[5;30018~"
set -s user-keys[9] "\e[5;30019~"

bind -n User0 previous-window # km:tmux.window.previous
bind -n User1 next-window # km:tmux.window.next
bind -n User2 swap-window -d -t -1 # km:tmux.window.move-left
bind -n User3 swap-window -d -t +1 # km:tmux.window.move-right
bind -n User4 split-window -h -c '#{pane_current_path}' # km:tmux.pane.split-right
bind -n User5 split-window -v -c '#{pane_current_path}' # km:tmux.pane.split-down
bind -n User6 run-shell -b "$HOME/.config/tmux/toggle-agent '#{pane_id}'" # km:tmux.agent.toggle
bind -n User7 kill-pane # km:tmux.pane.close
bind -n User8 new-window -c '#{pane_current_path}' # km:tmux.window.new
bind -n User9 copy-mode # km:tmux.copy-mode.enter

# Vi-style, keyboard-only scrollback selection. Copy directly to the macOS
# clipboard so it also works when OSC 52 clipboard forwarding is unavailable.
bind -T copy-mode-vi v send-keys -X begin-selection # km:tmux.copy-mode.select
bind -T copy-mode-vi V send-keys -X select-line # km:tmux.copy-mode.select-line
bind -T copy-mode-vi C-v send-keys -X rectangle-toggle # km:tmux.copy-mode.rectangle
bind -T copy-mode-vi y send-keys -X copy-pipe-and-cancel 'pbcopy' # km:tmux.copy-mode.copy
bind -T copy-mode-vi Enter send-keys -X copy-pipe-and-cancel 'pbcopy' # km:tmux.copy-mode.copy-enter

bind -n C-h switch-client -p -O name # km:tmux.session.previous
bind -n C-l switch-client -n -O name # km:tmux.session.next

bind -n M-h select-pane -L # km:tmux.pane.left
bind -n M-j select-pane -D # km:tmux.pane.down
bind -n M-k select-pane -U # km:tmux.pane.up
bind -n M-l select-pane -R # km:tmux.pane.right
bind -n M-H resize-pane -L 3 # km:tmux.pane.resize-left
bind -n M-J resize-pane -D 2 # km:tmux.pane.resize-down
bind -n M-K resize-pane -U 2 # km:tmux.pane.resize-up
bind -n M-L resize-pane -R 3 # km:tmux.pane.resize-right

bind c new-window -c '#{pane_current_path}' # km:tmux.admin.new-window
bind n command-prompt -p 'New session name:' "new-session -s '%%'" # km:tmux.admin.new-session
bind s choose-tree -s # km:tmux.admin.sessions
bind W choose-tree -w # km:tmux.admin.windows
bind w confirm-before -p 'Kill session #S? (y/n)' kill-session # km:tmux.admin.kill-session
bind d detach-client # km:tmux.admin.detach
bind r source-file "$HOME/.config/tmux/tmux.conf" \; display-message 'tmux configuration reloaded' # km:tmux.admin.reload
bind S run-shell "$HOME/.local/share/tmux/plugins/tmux-resurrect/scripts/save.sh" # km:tmux.admin.save
bind R run-shell "$HOME/.local/share/tmux/plugins/tmux-resurrect/scripts/restore.sh" # km:tmux.admin.restore
bind ? display-popup -E -w 90% -h 80% "$HOME/.config/tmux/keymap-popup" # km:tmux.admin.help

set -g @resurrect-dir "$HOME/.local/share/tmux/resurrect"
set -g @resurrect-capture-pane-contents 'on'
set -g @resurrect-strategy-nvim 'session'
